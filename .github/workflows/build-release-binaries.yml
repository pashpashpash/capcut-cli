name: build-release-binaries

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package archive
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/capcut-cli" capcut-cli
          tar -czf "dist/capcut-cli-${{ matrix.target }}.tar.gz" capcut-cli

      - uses: actions/upload-artifact@v4
        with:
          name: capcut-cli-${{ matrix.target }}
          path: dist/capcut-cli-${{ matrix.target }}.tar.gz
